<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>فيسبوك - الصفحة الرئيسية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background-color: #f0f2f5; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        
        // Lucide Icon Component Wrapper
        const Icon = ({ name, size = 24, className = "" }) => {
            const [iconSvg, setIconSvg] = useState("");
            useEffect(() => {
                if (window.lucide) {
                    const icon = window.lucide.icons[name];
                    if (icon) setIconSvg(icon.toSvg({ size, class: className }));
                }
            }, [name, size, className]);
            return <span dangerouslySetInnerHTML={{ __html: iconSvg }} />;
        };

        // Mock Initial Data
        const INITIAL_POSTS = [
            {
                id: 1,
                user: "أحمد محمد",
                avatar: "https://api.dicebear.com/7.x/avataaars/svg?seed=Ahmed",
                time: "منذ ساعتين",
                content: "اليوم بدأت في تعلم برمجة تطبيقات الويب باستخدام React! الشعور رائع جداً. 🚀 #برمجة #تعلم",
                image: "https://images.unsplash.com/photo-1633356122544-f134324a6cee?q=80&w=800",
                likes: 24,
                comments: 5,
                isLiked: false
            },
            {
                id: 2,
                user: "سارة خالد",
                avatar: "https://api.dicebear.com/7.x/avataaars/svg?seed=Sara",
                time: "منذ 5 ساعات",
                content: "ما هو أفضل مكان لتناول القهوة في وسط المدينة؟ أحتاج اقتراحاتكم ☕",
                image: null,
                likes: 12,
                comments: 18,
                isLiked: true
            }
        ];

        const NavItem = ({ iconName, active, onClick }) => (
            <button 
                onClick={onClick}
                className={`px-8 flex items-center justify-center border-b-4 transition-all h-full ${
                    active ? 'border-blue-600 text-blue-600' : 'border-transparent text-gray-500 hover:bg-gray-100 hover:rounded-lg'
                }`}
            >
                <Icon name={iconName} size={26} />
            </button>
        );

        const CircleBtn = ({ iconName }) => (
            <button className="w-10 h-10 bg-gray-200 rounded-full flex items-center justify-center hover:bg-gray-300 transition-colors">
                <Icon name={iconName} size={20} />
            </button>
        );

        const SidebarItem = ({ icon, label, isImage }) => (
            <div className="flex items-center gap-3 p-3 hover:bg-gray-200 rounded-lg cursor-pointer transition-colors">
                <div className="w-8 flex justify-center">
                    {isImage ? icon : <Icon name={icon} className="text-blue-500" />}
                </div>
                <span className="font-bold text-sm">{label}</span>
            </div>
        );

        const PostOption = ({ iconName, label, colorClass }) => (
            <button className="flex items-center gap-2 p-2 hover:bg-gray-100 rounded-lg flex-grow justify-center transition-colors">
                <Icon name={iconName} size={24} className={colorClass} />
                <span className="text-gray-500 font-bold text-sm">{label}</span>
            </button>
        );

        const StoryCard = ({ image, name, isAdd }) => (
            <div className="relative min-w-[110px] h-48 rounded-xl overflow-hidden shadow cursor-pointer group flex-shrink-0">
                <img src={image} className="w-full h-full object-cover group-hover:scale-105 transition-transform" />
                <div className="absolute inset-0 bg-black/20 group-hover:bg-black/10 transition-colors" />
                {isAdd ? (
                    <div className="absolute bottom-0 w-full bg-white h-12 flex flex-col items-center justify-end pb-2">
                        <div className="absolute top-0 -translate-y-1/2 bg-blue-600 p-1.5 rounded-full border-4 border-white text-white">
                            <Icon name="Plus" size={20} />
                        </div>
                        <span className="text-xs font-bold text-gray-800">{name}</span>
                    </div>
                ) : (
                    <>
                        <div className="absolute top-3 left-3 border-4 border-blue-600 rounded-full overflow-hidden">
                            <img src={`https://api.dicebear.com/7.x/avataaars/svg?seed=${name}`} className="w-8 h-8" />
                        </div>
                        <span className="absolute bottom-2 right-2 text-white font-bold text-xs">{name}</span>
                    </>
                )}
            </div>
        );

        const Post = ({ post, onLike }) => (
            <div className="bg-white rounded-xl shadow">
                <div className="p-4 flex justify-between items-start">
                    <div className="flex gap-3">
                        <img src={post.avatar} className="w-10 h-10 rounded-full" />
                        <div>
                            <h4 className="font-bold text-sm hover:underline cursor-pointer">{post.user}</h4>
                            <p className="text-xs text-gray-500">{post.time}</p>
                        </div>
                    </div>
                    <button className="text-gray-500 hover:bg-gray-100 p-1 rounded-full"><Icon name="MoreHorizontal" size={20} /></button>
                </div>
                <div className="px-4 pb-3">
                    <p className="text-sm whitespace-pre-wrap">{post.content}</p>
                </div>
                {post.image && <img src={post.image} className="w-full h-auto" />}
                <div className="px-4 py-2 flex justify-between text-gray-500 text-sm">
                    <div className="flex items-center gap-1">
                        <div className="bg-blue-500 p-1 rounded-full text-white flex items-center justify-center">
                            <Icon name="ThumbsUp" size={10} />
                        </div>
                        <span>{post.likes}</span>
                    </div>
                    <div className="flex gap-3">
                        <span>{post.comments} تعليق</span>
                        <span>شارك مرة واحدة</span>
                    </div>
                </div>
                <div className="h-[1px] bg-gray-200 mx-4" />
                <div className="flex px-2 py-1">
                    <ActionButton 
                        iconName="ThumbsUp" 
                        label="إعجاب" 
                        active={post.isLiked}
                        onClick={onLike}
                    />
                    <ActionButton iconName="MessageSquare" label="تعليق" />
                    <ActionButton iconName="Share2" label="مشاركة" />
                </div>
            </div>
        );

        const ActionButton = ({ iconName, label, active, onClick }) => (
            <button 
                onClick={onClick}
                className={`flex items-center justify-center gap-2 flex-grow p-2 hover:bg-gray-100 rounded-lg transition-colors ${active ? 'text-blue-600 font-bold' : 'text-gray-500 font-bold'}`}
            >
                <Icon name={iconName} size={20} className={active ? 'fill-blue-600' : ''} />
                <span className="text-sm">{label}</span>
            </button>
        );

        const App = () => {
            const [posts, setPosts] = useState(INITIAL_POSTS);
            const [postText, setPostText] = useState("");
            const [activeTab, setActiveTab] = useState('home');

            const handleLike = (id) => {
                setPosts(posts.map(post => {
                    if (post.id === id) {
                        return {
                            ...post,
                            likes: post.isLiked ? post.likes - 1 : post.likes + 1,
                            isLiked: !post.isLiked
                        };
                    }
                    return post;
                }));
            };

            const createPost = () => {
                if (!postText.trim()) return;
                const newPost = {
                    id: Date.now(),
                    user: "المستخدم الحالي",
                    avatar: "https://api.dicebear.com/7.x/avataaars/svg?seed=User",
                    time: "الآن",
                    content: postText,
                    image: null,
                    likes: 0,
                    comments: 0,
                    isLiked: false
                };
                setPosts([newPost, ...posts]);
                setPostText("");
            };

            return (
                <div className="min-h-screen bg-[#f0f2f5] font-sans text-right" dir="rtl">
                    <header className="sticky top-0 z-50 bg-white shadow-sm px-4 h-14 flex items-center justify-between">
                        <div className="flex items-center gap-2">
                            <div className="bg-blue-600 p-1 rounded-full flex items-center justify-center w-10 h-10">
                                <h1 className="text-white font-bold text-2xl leading-none">f</h1>
                            </div>
                            <div className="relative hidden md:block">
                                <span className="absolute right-3 top-2 text-gray-400"><Icon name="Search" size={18} /></span>
                                <input type="text" placeholder="البحث في فيسبوك" className="bg-gray-100 rounded-full py-2 pr-10 pl-4 w-60 focus:outline-none focus:ring-2 focus:ring-blue-500" />
                            </div>
                        </div>
                        <nav className="flex items-center gap-1 h-full">
                            <NavItem iconName="Home" active={activeTab === 'home'} onClick={() => setActiveTab('home')} />
                            <NavItem iconName="Video" active={activeTab === 'video'} onClick={() => setActiveTab('video')} />
                            <NavItem iconName="Store" active={activeTab === 'store'} onClick={() => setActiveTab('store')} />
                            <NavItem iconName="Users" active={activeTab === 'users'} onClick={() => setActiveTab('users')} />
                            <NavItem iconName="Gamepad2" active={activeTab === 'gaming'} onClick={() => setActiveTab('gaming')} />
                        </nav>
                        <div className="flex items-center gap-2">
                            <CircleBtn iconName="Plus" />
                            <CircleBtn iconName="MessageCircle" />
                            <CircleBtn iconName="Bell" />
                            <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=User" className="w-10 h-10 rounded-full cursor-pointer hover:opacity-90" />
                        </div>
                    </header>

                    <main className="max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-4 lg:grid-cols-12 gap-4 mt-4 px-4">
                        <aside className="hidden lg:block lg:col-span-3 space-y-1">
                            <SidebarItem isImage icon={<img src="https://api.dicebear.com/7.x/avataaars/svg?seed=User" className="w-8 h-8 rounded-full" />} label="المستخدم الحالي" />
                            <SidebarItem icon="Users" label="الأصدقاء" />
                            <SidebarItem icon="Bell" label="المجموعات" />
                            <SidebarItem icon="Store" label="Marketplace" />
                            <SidebarItem icon="Video" label="Watch" />
                            <SidebarItem icon="Menu" label="رؤية المزيد" />
                        </aside>

                        <section className="col-span-1 md:col-span-4 lg:col-span-6 space-y-4 pb-10">
                            <div className="flex gap-2 overflow-x-auto pb-2 scrollbar-hide">
                                <StoryCard image="https://images.unsplash.com/photo-1511367461989-f85a21fda167?w=200" name="أضف قصة" isAdd />
                                <StoryCard image="https://images.unsplash.com/photo-1506744038136-46273834b3fb?w=200" name="أحمد محمد" />
                                <StoryCard image="https://images.unsplash.com/photo-1470071459604-3b5ec3a7fe05?w=200" name="سارة خالد" />
                            </div>

                            <div className="bg-white rounded-xl shadow p-4">
                                <div className="flex gap-3 mb-3">
                                    <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=User" className="w-10 h-10 rounded-full" />
                                    <input 
                                        type="text" 
                                        value={postText}
                                        onChange={(e) => setPostText(e.target.value)}
                                        placeholder="بماذا تفكر يا مستخدم؟" 
                                        className="bg-gray-100 rounded-full px-4 flex-grow hover:bg-gray-200 cursor-pointer focus:outline-none"
                                    />
                                </div>
                                <div className="h-[1px] bg-gray-200 my-3" />
                                <div className="flex justify-between">
                                    <PostOption iconName="Video" label="فيديو مباشر" colorClass="text-red-500" />
                                    <PostOption iconName="Image" label="صور/فيديو" colorClass="text-green-500" />
                                    <PostOption iconName="Smile" label="شعور/نشاط" colorClass="text-yellow-500" />
                                </div>
                                {postText && (
                                    <button onClick={createPost} className="w-full mt-4 bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 rounded-lg transition-colors">نشر</button>
                                )}
                            </div>

                            {posts.map(post => (
                                <Post key={post.id} post={post} onLike={() => handleLike(post.id)} />
                            ))}
                        </section>

                        <aside className="hidden md:block md:col-span-4 lg:col-span-3">
                            <div className="bg-white rounded-xl shadow p-4 mb-4">
                                <h3 className="text-gray-500 font-bold mb-3">طلبات الصداقة</h3>
                                <div className="flex gap-3 items-center">
                                    <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Friend" className="w-12 h-12 rounded-full" />
                                    <div className="flex-grow">
                                        <p className="font-bold text-sm">محمد علي</p>
                                        <div className="flex gap-2 mt-1">
                                            <button className="bg-blue-600 text-white px-3 py-1 rounded-md text-xs font-bold flex-grow">تأكيد</button>
                                            <button className="bg-gray-200 text-gray-800 px-3 py-1 rounded-md text-xs font-bold flex-grow">حذف</button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <div className="space-y-4">
                                <h3 className="text-gray-500 font-bold">جهات الاتصال</h3>
                                <div className="flex items-center gap-3 p-2 hover:bg-gray-200 rounded-lg cursor-pointer">
                                    <div className="relative">
                                        <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Ahmed" className="w-8 h-8 rounded-full" />
                                        <div className="absolute bottom-0 left-0 w-3 h-3 bg-green-500 border-2 border-white rounded-full"></div>
                                    </div>
                                    <span className="font-bold text-sm">أحمد محمد</span>
                                </div>
                                <div className="flex items-center gap-3 p-2 hover:bg-gray-200 rounded-lg cursor-pointer">
                                    <div className="relative">
                                        <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Sara" className="w-8 h-8 rounded-full" />
                                        <div className="absolute bottom-0 left-0 w-3 h-3 bg-green-500 border-2 border-white rounded-full"></div>
                                    </div>
                                    <span className="font-bold text-sm">سارة خالد</span>
                                </div>
                            </div>
                        </aside>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html
