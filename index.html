<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KARAM ONE PRO | AI & Design Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- تم تصحيح رابط مكتبة Lucide لتعمل مع React في المتصفح -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/lucide-react@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@100..900&display=swap');
        body { font-family: 'Noto Sans Arabic', sans-serif; scroll-behavior: smooth; overflow: hidden; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 10px; }
        .canvas-dot { background-image: radial-gradient(rgba(255,255,255,0.05) 1px, transparent 1px); background-size: 20px 20px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useEffect } = React;
        
        // استخراج الأيقونات بطريقة متوافقة مع المتصفح
        const { 
            Menu, Plus, MessageSquare, Settings, Send, User, Sparkles, 
            Moon, Sun, Image: ImageIcon, Palette, Trash2, Download, 
            Layers, Type, Square, Circle, Zap, Share2, X, Key, Lock
        } = lucideReact;

        function App() {
            const [activeTab, setActiveTab] = useState('chat');
            const [isSidebarOpen, setIsSidebarOpen] = useState(true);
            const [isDarkMode, setIsDarkMode] = useState(true);
            
            // API Security Management
            const [apiKey, setApiKey] = useState(localStorage.getItem('KARAM_PRO_KEY') || '');
            const [showKeyPrompt, setShowKeyPrompt] = useState(!localStorage.getItem('KARAM_PRO_KEY'));
            const [inputKey, setInputKey] = useState('');

            // Chat States
            const [messages, setMessages] = useState([{ role: 'model', text: 'أهلاً بك في KARAM ONE PRO. تم تأمين الكود للرفع على GitHub. يرجى إدخال مفتاحك للبدء.' }]);
            const [inputValue, setInputValue] = useState('');
            const [isLoading, setIsLoading] = useState(false);

            // Studio States
            const [elements, setElements] = useState([]);
            const [selectedElement, setSelectedElement] = useState(null);

            const messagesEndRef = useRef(null);

            useEffect(() => {
                messagesEndRef.current?.scrollIntoView({ behavior: "smooth" });
            }, [messages]);

            const saveApiKey = () => {
                if (inputKey.trim().startsWith('AIza')) {
                    localStorage.setItem('KARAM_PRO_KEY', inputKey.trim());
                    setApiKey(inputKey.trim());
                    setShowKeyPrompt(false);
                    setMessages(prev => [...prev, { role: 'model', text: 'تم تفعيل المفتاح بنجاح! أنا جاهز لمساعدتك.' }]);
                } else {
                    alert("يرجى إدخال مفتاح Gemini صالح.");
                }
            };

            const handleSendMessage = async () => {
                if (!inputValue.trim() || isLoading) return;
                
                if (!apiKey) {
                    setShowKeyPrompt(true);
                    return;
                }

                const userText = inputValue;
                setMessages(prev => [...prev, { role: 'user', text: userText }]);
                setInputValue('');
                setIsLoading(true);

                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: userText }] }],
                            generationConfig: { temperature: 0.7, maxOutputTokens: 1000 }
                        })
                    });
                    
                    const data = await response.json();
                    if (data.error) throw new Error(data.error.message);

                    const reply = data.candidates?.[0]?.content?.parts?.[0]?.text || "عذراً، لم أستطع الرد حالياً.";
                    setMessages(prev => [...prev, { role: 'model', text: reply }]);
                } catch (error) {
                    setMessages(prev => [...prev, { role: 'model', text: `خطأ: ${error.message}.` }]);
                    if (error.message.includes("API key")) {
                        localStorage.removeItem('KARAM_PRO_KEY');
                        setApiKey('');
                    }
                } finally {
                    setIsLoading(false);
                }
            };

            const addElement = (type) => {
                const newEl = { 
                    id: Date.now(), 
                    type, 
                    x: 50, 
                    y: 50, 
                    width: type === 'text' ? 'auto' : 100, 
                    height: type === 'text' ? 'auto' : 100, 
                    color: '#3b82f6', 
                    text: type === 'text' ? 'اكتب هنا' : '' 
                };
                setElements([...elements, newEl]);
                setSelectedElement(newEl);
            };

            const SidebarItem = ({ active, onClick, icon: Icon, label }) => (
                <button onClick={onClick} className={`w-full flex items-center gap-4 p-4 rounded-2xl transition-all ${active ? 'bg-blue-600 text-white shadow-lg shadow-blue-600/30 scale-[1.02]' : 'hover:bg-white/5 text-gray-500 hover:text-gray-300'}`}>
                    <Icon size={20} /> <span className="font-bold text-sm tracking-wide">{label}</span>
                </button>
            );

            const ToolbarBtn = ({ onClick, icon: Icon, label }) => (
                <button onClick={onClick} title={label} className="p-3.5 hover:bg-white/10 rounded-2xl text-gray-500 hover:text-blue-400 transition-all active:scale-90 border border-transparent hover:border-white/10">
                    <Icon size={22} />
                </button>
            );

            return (
                <div className={`flex h-screen overflow-hidden ${isDarkMode ? 'bg-[#0a0a0b] text-white' : 'bg-gray-50 text-gray-900'}`}>
                    
                    {showKeyPrompt && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center bg-black/90 backdrop-blur-md p-4">
                            <div className="bg-[#121214] border border-white/10 p-8 rounded-3xl max-w-md w-full shadow-2xl text-center">
                                <div className="inline-flex p-4 bg-blue-600/20 rounded-2xl text-blue-500 mb-6"><Lock size={32}/></div>
                                <h2 className="text-2xl font-bold mb-3 text-white">تفعيل الوصول الآمن</h2>
                                <p className="text-gray-400 text-sm mb-6 leading-relaxed text-white">
                                    يرجى إدخال مفتاح API الخاص بك. 
                                    <br/> سيتم حفظه محلياً ولن يظهر في الكود المصدري.
                                </p>
                                <input 
                                    type="password" 
                                    placeholder="أدخل مفتاح Gemini API (AIza...)"
                                    className="w-full bg-white/5 border border-white/10 p-4 rounded-xl mb-4 focus:ring-2 ring-blue-500 outline-none text-center text-white transition-all"
                                    value={inputKey}
                                    onChange={(e) => setInputKey(e.target.value)}
                                />
                                <button onClick={saveApiKey} className="w-full bg-blue-600 hover:bg-blue-500 p-4 rounded-xl font-bold text-white transition-all transform active:scale-95 shadow-lg shadow-blue-600/20">تفعيل الآن</button>
                                {apiKey && <button onClick={() => setShowKeyPrompt(false)} className="mt-4 text-gray-500 text-sm hover:text-white transition-colors">إغلاق</button>}
                            </div>
                        </div>
                    )}

                    <aside className={`transition-all duration-500 ease-in-out ${isSidebarOpen ? 'w-80' : 'w-0'} flex flex-col border-l border-white/10 glass z-20 overflow-hidden`}>
                        <div className="p-8 flex-1 overflow-y-auto custom-scrollbar">
                            <div className="flex items-center gap-3 mb-12">
                                <div className="p-2.5 bg-blue-600 rounded-xl shadow-lg shadow-blue-500/20"><Sparkles size={24} className="text-white" /></div>
                                <h1 className="text-xl font-black tracking-tighter whitespace-nowrap">KARAM ONE PRO</h1>
                            </div>
                            <nav className="space-y-2">
                                <SidebarItem active={activeTab === 'chat'} onClick={() => setActiveTab('chat')} icon={MessageSquare} label="المساعد الذكي" />
                                <SidebarItem active={activeTab === 'studio'} onClick={() => setActiveTab('studio')} icon={Palette} label="الاستوديو الإبداعي" />
                            </nav>
                        </div>
                        <div className="p-6 border-t border-white/5 space-y-2">
                            <button onClick={() => setShowKeyPrompt(true)} className="flex items-center gap-3 p-3 w-full hover:bg-white/5 rounded-xl transition-colors text-blue-400">
                                <Key size={20}/> <span className="font-medium">تغيير المفتاح</span>
                            </button>
                            <button onClick={() => setIsDarkMode(!isDarkMode)} className="flex items-center gap-3 p-3 w-full hover:bg-white/5 rounded-xl transition-colors text-gray-400">
                                {isDarkMode ? <Sun size={20}/> : <Moon size={20}/>}
                                <span className="font-medium text-sm">{isDarkMode ? 'الوضع المضيء' : 'الوضع الليلي'}</span>
                            </button>
                        </div>
                    </aside>

                    <main className="flex-1 flex flex-col relative min-w-0">
                        <header className="h-20 flex items-center justify-between px-8 border-b border-white/5 glass z-10">
                            <button onClick={() => setIsSidebarOpen(!isSidebarOpen)} className="p-2.5 hover:bg-white/5 rounded-xl transition-all border border-white/5">
                                <Menu size={20} />
                            </button>
                            <div className="flex items-center gap-4 text-white">
                                <div className="hidden md:flex items-center gap-2 bg-emerald-500/10 text-emerald-500 px-3 py-1.5 rounded-full text-[10px] font-bold border border-emerald-500/20 tracking-wider">
                                    رفع آمن على GITHUB
                                </div>
                                <div className="w-10 h-10 rounded-xl bg-gradient-to-tr from-blue-600 to-indigo-600 flex items-center justify-center font-bold shadow-xl">K</div>
                            </div>
                        </header>

                        <section className="flex-1 overflow-hidden relative">
                            {activeTab === 'chat' && (
                                <div className="h-full flex flex-col max-w-4xl mx-auto p-6">
                                    <div className="flex-1 overflow-y-auto space-y-6 mb-4 pr-2 custom-scrollbar">
                                        {messages.map((m, i) => (
                                            <div key={i} className={`flex ${m.role === 'user' ? 'justify-end' : 'justify-start'} animate-in fade-in slide-in-from-bottom-3`}>
                                                <div className={`p-5 rounded-2xl max-w-[85%] shadow-sm ${m.role === 'user' ? 'bg-blue-600 text-white' : 'glass border-white/5 text-gray-300'}`}>
                                                    <p className="text-sm md:text-base leading-relaxed">{m.text}</p>
                                                </div>
                                            </div>
                                        ))}
                                        {isLoading && <div className="text-blue-500 flex gap-2 animate-pulse text-sm"><Sparkles size={16}/> جاري التفكير...</div>}
                                        <div ref={messagesEndRef} />
                                    </div>
                                    <div className="glass p-2 rounded-2xl flex gap-2 items-center focus-within:ring-2 ring-blue-500/30 transition-all border border-white/10">
                                        <input 
                                            className="flex-1 bg-transparent border-none outline-none p-3 text-sm md:text-base text-white" 
                                            placeholder="اسأل KARAM PRO عن أي شيء..." 
                                            value={inputValue} 
                                            onChange={e => setInputValue(e.target.value)} 
                                            onKeyDown={e => e.key === 'Enter' && handleSendMessage()} 
                                        />
                                        <button onClick={handleSendMessage} className="p-3.5 bg-blue-600 hover:bg-blue-500 rounded-xl transition-all active:scale-90 text-white shadow-lg shadow-blue-600/20">
                                            <Send size={20} />
                                        </button>
                                    </div>
                                </div>
                            )}

                            {activeTab === 'studio' && (
                                <div className="h-full flex flex-col md:flex-row">
                                    <div className="w-full md:w-20 border-l border-white/10 glass flex md:flex-col items-center justify-center py-6 gap-6 order-last md:order-first">
                                        <ToolbarBtn onClick={() => addElement('rect')} icon={Square} label="مربع" />
                                        <ToolbarBtn onClick={() => addElement('circle')} icon={Circle} label="دائرة" />
                                        <ToolbarBtn onClick={() => addElement('text')} icon={Type} label="نص" />
                                        <div className="h-px w-10 bg-white/10 hidden md:block"></div>
                                        <ToolbarBtn onClick={() => setElements([])} icon={Trash2} label="مسح" />
                                    </div>
                                    <div className="flex-1 bg-[#0c0c0e] canvas-dot flex items-center justify-center p-4 overflow-auto custom-scrollbar">
                                        <div className="bg-white rounded-xl shadow-2xl relative overflow-hidden" style={{ width: '100%', maxWidth: '800px', height: '500px' }}>
                                            {elements.map(el => (
                                                <div 
                                                    key={el.id} 
                                                    onClick={() => setSelectedElement(el)}
                                                    className={`absolute cursor-move transition-shadow ${selectedElement?.id === el.id ? 'ring-2 ring-blue-500 shadow-xl' : ''}`}
                                                    style={{ 
                                                        left: el.x, top: el.y, width: el.width, height: el.height, 
                                                        backgroundColor: el.type === 'text' ? 'transparent' : el.color, 
                                                        borderRadius: el.type === 'circle' ? '50%' : '8px',
                                                        display: 'flex', alignItems: 'center', justifyContent: 'center'
                                                    }}
                                                >
                                                    {el.type === 'text' && <span className="font-bold text-black p-2 text-center leading-none">{el.text}</span>}
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            )}
                        </section>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
