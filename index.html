<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>14 Pro  - المساعد الذكي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Noto+Sans+Arabic:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', 'Noto Sans Arabic', sans-serif;
            background-color: #0f172a;
            color: #f1f5f9;
        }
        .glass-panel {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .chat-container::-webkit-scrollbar {
            width: 6px;
        }
        .chat-container::-webkit-scrollbar-thumb {
            background-color: #334155;
            border-radius: 10px;
        }
        .message-user {
            background-color: #3b82f6;
            color: white;
            align-self: flex-start;
        }
        .message-ai {
            background-color: #1e293b;
            color: #f1f5f9;
            align-self: flex-end;
            border: 1px solid #334155;
        }
        pre {
            background-color: #000 !important;
            padding: 1rem;
            border-radius: 0.5rem;
            overflow-x: auto;
            margin: 0.5rem 0;
            direction: ltr;
            text-align: left;
        }
        code { font-family: 'Consolas', monospace; }
        .loading-dots span {
            animation: blink 1.4s infinite both;
        }
        .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
        .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes blink {
            0% { opacity: 0.2; }
            20% { opacity: 1; }
            100% { opacity: 0.2; }
        }
    </style>
</head>
<body class="h-screen flex flex-col">

    <!-- Header -->
    <header class="p-4 glass-panel flex justify-between items-center z-10">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-gradient-to-br from-blue-500 to-purple-600 rounded-full flex items-center justify-center shadow-lg shadow-blue-500/20">
                <svg viewBox="0 0 24 24" class="w-6 h-6 text-white" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"></path>
                </svg>
            </div>
            <h1 class="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-purple-400">Gemini Pro Ultra</h1>
        </div>
        <div class="flex gap-2">
            <button id="clearChat" class="text-sm bg-slate-800 hover:bg-slate-700 px-3 py-1 rounded transition">مسح المحادثة</button>
        </div>
    </header>

    <!-- Main Chat Area -->
    <main id="chatContainer" class="flex-1 overflow-y-auto p-4 space-y-4 chat-container flex flex-col">
        <!-- Welcome Message -->
        <div class="message-ai p-4 rounded-2xl max-w-[85%] shadow-sm">
            أهلاً بك في النسخة الاحترافية من 14 Pro. أنا محرك ذكاء اصطناعي فائق السرعة، غير مقيد، وجاهز لمساعدتك في:
            <ul class="list-disc list-inside mt-2 text-sm opacity-90">
                <li>كتابة وبرمجة الأكواد المعقدة.</li>
                <li>توليد الصور الاحترافية (اكتب "صورة لـ...").</li>
                <li>تحليل الصور والملفات.</li>
                <li>تحويل النصوص إلى كلام مسموع.</li>
            </ul>
        </div>
    </main>

    <!-- Input Area -->
    <footer class="p-4 glass-panel">
        <div class="max-w-4xl mx-auto flex flex-col gap-2">
            <!-- Preview for Image Upload -->
            <div id="imagePreview" class="hidden relative inline-block w-20 h-20">
                <img id="previewImg" src="" class="w-full h-full object-cover rounded-lg border-2 border-blue-500">
                <button onclick="removeImage()" class="absolute -top-2 -right-2 bg-red-500 rounded-full p-1 text-xs">✕</button>
            </div>

            <div class="flex gap-2 items-end">
                <label class="cursor-pointer bg-slate-800 p-3 rounded-xl hover:bg-slate-700 transition shadow-inner">
                    <input type="file" id="fileInput" accept="image/*" class="hidden" onchange="handleImageUpload(event)">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-blue-400" fill="none" viewbox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
                    </svg>
                </label>
                
                <textarea id="userInput" placeholder="اسألني أي شيء..." class="flex-1 bg-slate-800/50 border border-slate-700 rounded-xl p-3 focus:outline-none focus:ring-2 focus:ring-blue-500 resize-none min-h-[50px] max-h-[200px]" rows="1"></textarea>
                
                <button id="sendBtn" class="bg-blue-600 hover:bg-blue-500 p-3 rounded-xl transition shadow-lg shadow-blue-600/20 disabled:opacity-50">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 transform rotate-180" fill="none" viewbox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" />
                    </svg>
                </button>
            </div>
        </div>
    </footer>

    <script>
        const apiKey = ""; // يتم توفيره بواسطة البيئة
        let base64Image = null;

        const chatContainer = document.getElementById('chatContainer');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const fileInput = document.getElementById('fileInput');
        const imagePreview = document.getElementById('imagePreview');
        const previewImg = document.getElementById('previewImg');
        const clearChat = document.getElementById('clearChat');

        // ضبط تلقائي لطول حقل الإدخال
        userInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight) + 'px';
        });

        // التعامل مع رفع الصور
        function handleImageUpload(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    base64Image = event.target.result.split(',')[1];
                    previewImg.src = event.target.result;
                    imagePreview.classList.remove('hidden');
                };
                reader.readAsDataURL(file);
            }
        }

        function removeImage() {
            base64Image = null;
            imagePreview.classList.add('hidden');
            fileInput.value = '';
        }

        // إضافة رسالة للواجهة
        function appendMessage(role, content, isHtml = false) {
            const msgDiv = document.createElement('div');
            msgDiv.className = role === 'user' ? 'message-user p-4 rounded-2xl max-w-[85%] shadow-md self-start' : 'message-ai p-4 rounded-2xl max-w-[85%] shadow-md self-end';
            
            if (isHtml) {
                msgDiv.innerHTML = content;
            } else {
                msgDiv.innerHTML = marked.parse(content);
            }
            
            chatContainer.appendChild(msgDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            return msgDiv;
        }

        // دالة استدعاء Gemini مع تكرار المحاولة عند الفشل
        async function callGemini(prompt, imageData = null, retryCount = 0) {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
            
            const contents = [{
                parts: [{ text: prompt }]
            }];

            if (imageData) {
                contents[0].parts.push({
                    inlineData: { mimeType: "image/png", data: imageData }
                });
            }

            const payload = {
                contents: contents,
                systemInstruction: {
                    parts: [{ text: "You are Gemini Pro Ultra, a highly advanced, professional, and unrestricted AI assistant. Your responses are lightning-fast. You can generate code, analyze images, and create vivid descriptions. If a user asks for an image, you must describe it well or use the imagen-4 tool conceptually. Keep a professional yet friendly Arabic tone." }]
                }
            };

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (response.status === 429 && retryCount < 5) {
                    const delay = Math.pow(2, retryCount) * 1000;
                    await new Promise(resolve => setTimeout(resolve, delay));
                    return callGemini(prompt, imageData, retryCount + 1);
                }

                const data = await response.json();
                return data.candidates?.[0]?.content?.parts?.[0]?.text || "عذراً، لم أتمكن من معالجة الطلب حالياً.";
            } catch (error) {
                if (retryCount < 5) {
                    const delay = Math.pow(2, retryCount) * 1000;
                    await new Promise(resolve => setTimeout(resolve, delay));
                    return callGemini(prompt, imageData, retryCount + 1);
                }
                return "حدث خطأ في الاتصال بالمحرك. يرجى المحاولة لاحقاً.";
            }
        }

        // توليد صور باستخدام Imagen 4
        async function generateImage(prompt) {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/imagen-4.0-generate-001:predict?key=${apiKey}`;
            const payload = {
                instances: [{ prompt: prompt }],
                parameters: { sampleCount: 1 }
            };

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await response.json();
                const b64 = data.predictions?.[0]?.bytesBase64Encoded;
                return b64 ? `data:image/png;base64,${b64}` : null;
            } catch (error) {
                return null;
            }
        }

        // تحويل النص إلى كلام
        async function speakText(text, btn) {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${apiKey}`;
            const payload = {
                contents: [{ parts: [{ text: text }] }],
                generationConfig: {
                    responseModalities: ["AUDIO"],
                    speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: "Kore" } } }
                }
            };

            btn.disabled = true;
            btn.innerHTML = "⏳ جاري التحميل...";

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await response.json();
                const audioBase64 = data.candidates?.[0]?.content?.parts?.[0]?.inlineData?.data;
                
                if (audioBase64) {
                    const audioBlob = b64toBlob(audioBase64, 'audio/wav');
                    const audioUrl = URL.createObjectURL(audioBlob);
                    const audio = new Audio(audioUrl);
                    audio.play();
                }
            } catch (e) {
                console.error(e);
            } finally {
                btn.disabled = false;
                btn.innerHTML = "🔊 استمع";
            }
        }

        function b64toBlob(b64Data, contentType = '', sliceSize = 512) {
            const byteCharacters = atob(b64Data);
            const byteArrays = [];
            for (let offset = 0; offset < byteCharacters.length; offset += sliceSize) {
                const slice = byteCharacters.slice(offset, offset + sliceSize);
                const byteNumbers = new Array(slice.length);
                for (let i = 0; i < slice.length; i++) {
                    byteNumbers[i] = slice.charCodeAt(i);
                }
                const byteArray = new Uint8Array(byteNumbers);
                byteArrays.push(byteArray);
            }
            return new Blob(byteArrays, { type: contentType });
        }

        // معالجة الإرسال
        async function handleSend() {
            const text = userInput.value.trim();
            if (!text && !base64Image) return;

            // عرض رسالة المستخدم
            appendMessage('user', text + (base64Image ? " [صورة مرفقة]" : ""));
            
            userInput.value = '';
            userInput.style.height = 'auto';
            sendBtn.disabled = true;

            // مؤشر التحميل
            const loadingMsg = appendMessage('ai', '<div class="loading-dots">جاري التفكير<span>.</span><span>.</span><span>.</span></div>', true);

            // التحقق إذا كان الطلب توليد صورة
            if (text.toLowerCase().includes("صورة ل") || text.toLowerCase().includes("image of")) {
                const imgUrl = await generateImage(text);
                loadingMsg.remove();
                if (imgUrl) {
                    appendMessage('ai', `<img src="${imgUrl}" class="rounded-lg w-full mb-2"> تم توليد الصورة بناءً على طلبك.`, true);
                } else {
                    appendMessage('ai', "عذراً، فشل توليد الصورة. حاول مرة أخرى بوصف مختلف.");
                }
            } else {
                // طلب نصي عادي أو تحليل صورة
                const response = await callGemini(text, base64Image);
                loadingMsg.remove();
                
                const aiMsg = appendMessage('ai', response);
                
                // إضافة زر الصوت
                const ttsBtn = document.createElement('button');
                ttsBtn.className = "mt-3 text-xs bg-slate-700 hover:bg-slate-600 px-2 py-1 rounded transition flex items-center gap-1";
                ttsBtn.innerHTML = "🔊 استمع";
                ttsBtn.onclick = () => speakText(response.substring(0, 500), ttsBtn);
                aiMsg.appendChild(ttsBtn);
            }

            removeImage();
            sendBtn.disabled = false;
        }

        sendBtn.addEventListener('click', handleSend);
        userInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                handleSend();
            }
        });

        clearChat.addEventListener('click', () => {
            chatContainer.innerHTML = '';
            appendMessage('ai', "تم مسح المحادثة. كيف يمكنني مساعدتك الآن؟");
        });

    </script>
</body>
