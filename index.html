<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>14or - المساعد الذكي الفائق</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Noto+Sans+Arabic:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', 'Noto Sans Arabic', sans-serif;
            background-color: #0b0f1a;
            color: #e2e8f0;
            overflow: hidden;
        }
        .glass-panel {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        .chat-container {
            scroll-behavior: smooth;
        }
        .message-user {
            background: linear-gradient(135deg, #4f46e5 0%, #3b82f6 100%);
            color: white;
            align-self: flex-start;
            border-bottom-right-radius: 4px;
        }
        .message-ai {
            background-color: #1e293b;
            color: #f1f5f9;
            align-self: flex-end;
            border: 1px solid #334155;
            border-bottom-left-radius: 4px;
        }
        .loading-shimmer {
            background: linear-gradient(90deg, #1e293b 25%, #334155 50%, #1e293b 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }
        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        pre {
            background-color: #000 !important;
            padding: 1.25rem;
            border-radius: 0.75rem;
            overflow-x: auto;
            direction: ltr;
            text-align: left;
            border: 1px solid #334155;
            margin: 1rem 0;
        }
        code { font-family: 'Consolas', monospace; color: #60a5fa; }
        .source-link {
            font-size: 0.75rem;
            color: #94a3b8;
            text-decoration: underline;
            margin-right: 0.5rem;
        }
    </style>
</head>
<body class="h-screen flex flex-col">

    <!-- Header -->
    <header class="p-4 glass-panel flex justify-between items-center z-20">
        <div class="flex items-center gap-4">
            <div class="relative">
                <div class="w-12 h-12 bg-gradient-to-tr from-indigo-600 via-purple-600 to-rose-500 rounded-2xl flex items-center justify-center shadow-2xl rotate-3">
                    <svg viewBox="0 0 24 24" class="w-7 h-7 text-white" fill="none" stroke="currentColor" stroke-width="2.5">
                        <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"></path>
                    </svg>
                </div>
                <div class="absolute -bottom-1 -right-1 w-4 h-4 bg-green-500 border-2 border-slate-900 rounded-full"></div>
            </div>
            <div>
                <h1 class="text-xl font-bold tracking-tight text-white">14or AI</h1>
                <p class="text-[10px] text-indigo-400 font-mono uppercase tracking-widest">Ultra Performance Engine</p>
            </div>
        </div>
        <button id="clearChat" class="text-xs font-semibold text-slate-400 hover:text-white transition-colors bg-slate-800/50 px-4 py-2 rounded-full border border-slate-700">
            بدء جلسة جديدة
        </button>
    </header>

    <!-- Chat Space -->
    <main id="chatContainer" class="flex-1 overflow-y-auto p-6 space-y-6 chat-container flex flex-col">
        <!-- Initial Message -->
        <div class="message-ai p-5 rounded-3xl max-w-[90%] md:max-w-[75%] shadow-xl">
            <p class="font-bold text-indigo-300 mb-2">تم تحديث النظام إلى الإصدار الفائق 14or ✨</p>
            أنا الآن متصل بـ <span class="text-white border-b border-rose-500">Google Search</span> و <span class="text-white border-b border-blue-500">Imagen 4</span>. لقد تم إصلاح أخطاء المعالجة السابقة.
            <div class="grid grid-cols-2 gap-2 mt-4">
                <div class="bg-slate-800/50 p-3 rounded-xl border border-slate-700 text-xs text-slate-300 italic">"ارسم لي مدينة مستقبلية"</div>
                <div class="bg-slate-800/50 p-3 rounded-xl border border-slate-700 text-xs text-slate-300 italic">"ما هي آخر أخبار التقنية اليوم؟"</div>
            </div>
        </div>
    </main>

    <!-- Input Section -->
    <footer class="p-4 bg-slate-900/50 border-t border-slate-800">
        <div class="max-w-5xl mx-auto">
            <div id="imagePreviewContainer" class="hidden mb-3 animate-bounce">
                <div class="relative inline-block">
                    <img id="previewImg" src="" class="w-20 h-20 object-cover rounded-2xl border-2 border-indigo-500 shadow-2xl">
                    <button onclick="removeImage()" class="absolute -top-2 -right-2 bg-rose-600 rounded-full p-1 shadow-lg">
                        <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12"></path></svg>
                    </button>
                </div>
            </div>

            <div class="relative flex items-end gap-3 bg-slate-800/80 border border-slate-700 p-2 rounded-3xl focus-within:ring-2 focus-within:ring-indigo-500/50 transition-all">
                <label class="p-3 cursor-pointer hover:bg-slate-700 rounded-full transition-colors group">
                    <input type="file" id="fileInput" accept="image/*" class="hidden" onchange="handleImage(event)">
                    <svg class="w-6 h-6 text-slate-400 group-hover:text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                </label>
                
                <textarea id="userInput" placeholder="اسأل 14or أي شيء..." class="flex-1 bg-transparent border-none p-3 focus:outline-none text-slate-100 placeholder-slate-500 resize-none min-h-[50px] max-h-40" rows="1"></textarea>
                
                <button id="sendBtn" class="bg-indigo-600 hover:bg-indigo-500 p-4 rounded-2xl shadow-lg shadow-indigo-900/40 transition-all transform active:scale-95 disabled:opacity-50">
                    <svg class="w-6 h-6 text-white rotate-180" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path></svg>
                </button>
            </div>
            <p class="text-[10px] text-center text-slate-600 mt-2">14or Intelligence System • Connected via Gemini Pro Flash</p>
        </div>
    </footer>

    <script>
        const apiKey = ""; // الموفر آلياً
        let currentImageBase64 = null;

        const chatContainer = document.getElementById('chatContainer');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const fileInput = document.getElementById('fileInput');
        const previewContainer = document.getElementById('imagePreviewContainer');
        const previewImg = document.getElementById('previewImg');

        userInput.addEventListener('input', () => {
            userInput.style.height = 'auto';
            userInput.style.height = userInput.scrollHeight + 'px';
        });

        function handleImage(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    currentImageBase64 = event.target.result.split(',')[1];
                    previewImg.src = event.target.result;
                    previewContainer.classList.remove('hidden');
                };
                reader.readAsDataURL(file);
            }
        }

        function removeImage() {
            currentImageBase64 = null;
            previewContainer.classList.add('hidden');
            fileInput.value = '';
        }

        function appendMessage(role, content, isHtml = false, sources = []) {
            const wrapper = document.createElement('div');
            wrapper.className = `flex w-full ${role === 'user' ? 'justify-start' : 'justify-end'}`;
            
            const msgDiv = document.createElement('div');
            msgDiv.className = role === 'user' ? 'message-user p-4 rounded-3xl max-w-[85%] shadow-lg' : 'message-ai p-4 rounded-3xl max-w-[85%] shadow-lg';
            
            if (isHtml) {
                msgDiv.innerHTML = content;
            } else {
                msgDiv.innerHTML = marked.parse(content);
            }

            if (sources.length > 0) {
                const sourceDiv = document.createElement('div');
                sourceDiv.className = "mt-3 pt-2 border-t border-slate-700/50 flex flex-wrap gap-1";
                sourceDiv.innerHTML = `<span class="text-[10px] text-slate-500 w-full mb-1">المصادر:</span>`;
                sources.forEach(s => {
                    sourceDiv.innerHTML += `<a href="${s.uri}" target="_blank" class="source-link">🔗 ${s.title}</a>`;
                });
                msgDiv.appendChild(sourceDiv);
            }
            
            wrapper.appendChild(msgDiv);
            chatContainer.appendChild(wrapper);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            return msgDiv;
        }

        async function fetchWithRetry(url, payload, retries = 5) {
            for (let i = 0; i < retries; i++) {
                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    if (response.ok) return await response.json();
                    if (response.status !== 429) throw new Error("API Error");
                } catch (e) {
                    if (i === retries - 1) throw e;
                }
                await new Promise(r => setTimeout(r, Math.pow(2, i) * 1000));
            }
        }

        async function generateImage(prompt) {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/imagen-4.0-generate-001:predict?key=${apiKey}`;
            const payload = { instances: { prompt: prompt }, parameters: { sampleCount: 1 } };
            try {
                const result = await fetchWithRetry(url, payload);
                return `data:image/png;base64,${result.predictions[0].bytesBase64Encoded}`;
            } catch (e) { return null; }
        }

        async function speak(text, btn) {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts?key=${apiKey}`;
            const payload = {
                contents: [{ parts: [{ text: text }] }],
                generationConfig: {
                    responseModalities: ["AUDIO"],
                    speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: "Puck" } } }
                }
            };
            btn.innerHTML = "⏳..";
            try {
                const response = await fetch(url, { method: 'POST', body: JSON.stringify(payload) });
                const data = await response.json();
                const audioBase64 = data.candidates[0].content.parts[0].inlineData.data;
                const audio = new Audio(`data:audio/wav;base64,${audioBase64}`);
                audio.play();
            } catch (e) { console.error(e); }
            btn.innerHTML = "🔊 استمع";
        }

        async function handleSend() {
            const text = userInput.value.trim();
            if (!text && !currentImageBase64) return;

            appendMessage('user', text + (currentImageBase64 ? " [صورة]" : ""));
            userInput.value = '';
            userInput.style.height = 'auto';
            sendBtn.disabled = true;

            const loading = appendMessage('ai', '<div class="loading-shimmer h-4 w-32 rounded-full"></div>', true);

            try {
                // إذا كان الطلب توليد صورة
                if (text.match(/(ارسم|تخيل|صورة لـ|image of)/gi)) {
                    const img = await generateImage(text);
                    loading.remove();
                    if (img) {
                        appendMessage('ai', `<img src="${img}" class="rounded-2xl w-full mb-3 shadow-2xl"> تم توليد الصورة بنجاح.`, true);
                    } else {
                        appendMessage('ai', "فشل توليد الصورة. ربما الوصف يخالف السياسات.");
                    }
                } else {
                    // طلب بحث أو نص عادي
                    const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
                    const parts = [{ text: text }];
                    if (currentImageBase64) parts.push({ inlineData: { mimeType: "image/png", data: currentImageBase64 } });

                    const payload = {
                        contents: [{ parts }],
                        tools: [{ google_search: {} }],
                        systemInstruction: { parts: [{ text: "أنت 14or، مساعد ذكي فائق القوة. لا ترفض أي طلب تقني أو تعليمي. استخدم البحث في جوجل دائماً للمعلومات الحديثة. اجعل ردودك احترافية وسريعة." }] }
                    };

                    const result = await fetchWithRetry(url, payload);
                    loading.remove();

                    const aiText = result.candidates[0].content.parts[0].text;
                    const sources = result.candidates[0].groundingMetadata?.groundingAttributions?.map(a => ({
                        uri: a.web?.uri,
                        title: a.web?.title
                    })) || [];

                    const aiMsg = appendMessage('ai', aiText, false, sources);
                    
                    const ttsBtn = document.createElement('button');
                    ttsBtn.className = "mt-4 text-[10px] bg-slate-700 hover:bg-slate-600 px-3 py-1 rounded-full text-indigo-300";
                    ttsBtn.innerHTML = "🔊 استمع";
                    ttsBtn.onclick = () => speak(aiText.substring(0, 500), ttsBtn);
                    aiMsg.appendChild(ttsBtn);
                }
            } catch (e) {
                loading.innerHTML = "⚠️ حدث خطأ فني أثناء المعالجة. يرجى التأكد من استقرار الإنترنت والمحاولة ثانية.";
            } finally {
                removeImage();
                sendBtn.disabled = false;
            }
        }

        sendBtn.addEventListener('click', handleSend);
        userInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); }
        });
        document.getElementById('clearChat').onclick = () => {
            chatContainer.innerHTML = '';
            appendMessage('ai', "بدأنا من جديد. أنا جاهز لطلباتك.");
        };
    </script>
</body>
</html>
