<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الحاسبة الذكية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Tajawal', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
        }
        .calc-button {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .calc-button:active {
            transform: scale(0.92);
        }
        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        .shake { animation: shake 0.2s ease-in-out infinite; }
        
        /* Hidden Dog Styles */
        #dog-overlay {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 50;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 2.5rem;
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div class="max-w-xs w-full glass rounded-[2.5rem] p-6 shadow-2xl relative overflow-hidden">
        <!-- Dog Overlay (The Surprise) -->
        <div id="dog-overlay" onclick="hideDog()">
            <img src="https://images.unsplash.com/photo-1517849845537-4d257902454a?auto=format&fit=crop&q=80&w=500" 
                 alt="[صورة كلب مضحك]" 
                 class="w-32 h-32 rounded-full border-4 border-yellow-500 mb-4 object-cover">
            <p class="text-yellow-500 font-bold text-center px-4 text-sm">توقف عن إفساد الرياضيات!</p>
            <p class="text-white text-[10px] mt-2 italic">انقر للإغلاق</p>
        </div>

        <!-- Decoration -->
        <div class="absolute -top-10 -right-10 w-32 h-32 bg-purple-500/10 rounded-full blur-3xl"></div>
        <div class="absolute -bottom-10 -left-10 w-32 h-32 bg-blue-500/10 rounded-full blur-3xl"></div>

        <!-- Display -->
        <div class="mb-6 p-4 text-right">
            <div id="prev-op" class="text-slate-500 text-sm h-5 mb-1 tracking-wider"></div>
            <div id="display" class="text-4xl font-bold text-white overflow-hidden whitespace-nowrap">0</div>
        </div>

        <!-- Buttons Grid -->
        <div class="grid grid-cols-4 gap-3">
            <!-- Row 1 -->
            <button onclick="triggerDog()" class="calc-button col-span-2 bg-red-500/20 text-red-400 font-bold py-4 rounded-2xl hover:bg-red-500/30">AC</button>
            <button onclick="appendOp('/')" class="calc-button bg-slate-700/50 text-blue-400 font-bold py-4 rounded-2xl hover:bg-slate-600">÷</button>
            <button onclick="appendOp('*')" class="calc-button bg-slate-700/50 text-blue-400 font-bold py-4 rounded-2xl hover:bg-slate-600">×</button>

            <!-- Row 2 -->
            <button onclick="appendNum('7')" class="calc-button bg-slate-800 text-slate-200 py-4 rounded-2xl hover:bg-slate-700">7</button>
            <button onclick="appendNum('8')" class="calc-button bg-slate-800 text-slate-200 py-4 rounded-2xl hover:bg-slate-700">8</button>
            <button onclick="appendNum('9')" class="calc-button bg-slate-800 text-slate-200 py-4 rounded-2xl hover:bg-slate-700">9</button>
            <button onclick="appendOp('-')" class="calc-button bg-slate-700/50 text-blue-400 font-bold py-4 rounded-2xl hover:bg-slate-600">-</button>

            <!-- Row 3 -->
            <button onclick="appendNum('4')" class="calc-button bg-slate-800 text-slate-200 py-4 rounded-2xl hover:bg-slate-700">4</button>
            <button onclick="appendNum('5')" class="calc-button bg-slate-800 text-slate-200 py-4 rounded-2xl hover:bg-slate-700">5</button>
            <button onclick="appendNum('6')" class="calc-button bg-slate-800 text-slate-200 py-4 rounded-2xl hover:bg-slate-700">6</button>
            <button onclick="appendOp('+')" class="calc-button bg-slate-700/50 text-blue-400 font-bold py-4 rounded-2xl hover:bg-slate-600">+</button>

            <!-- Row 4 -->
            <button onclick="appendNum('1')" class="calc-button bg-slate-800 text-slate-200 py-4 rounded-2xl hover:bg-slate-700">1</button>
            <button onclick="appendNum('2')" class="calc-button bg-slate-800 text-slate-200 py-4 rounded-2xl hover:bg-slate-700">3</button> <!-- TRICK: 2 writes 3 -->
            <button onclick="appendNum('3')" class="calc-button bg-slate-800 text-slate-200 py-4 rounded-2xl hover:bg-slate-700">2</button> <!-- TRICK: 3 writes 2 -->
            <button onclick="calculate()" class="calc-button row-span-2 bg-blue-600 text-white font-bold py-4 rounded-2xl hover:bg-blue-500 shadow-lg shadow-blue-900/40">=</button>

            <!-- Row 5 -->
            <button onclick="appendNum('0')" class="calc-button col-span-2 bg-slate-800 text-slate-200 py-4 rounded-2xl hover:bg-slate-700">0</button>
            <button onclick="appendNum('.')" class="calc-button bg-slate-800 text-slate-200 py-4 rounded-2xl hover:bg-slate-700">.</button>
        </div>

        <!-- System Message Box -->
        <div id="msg-box" class="mt-4 p-2 text-center text-[10px] text-slate-500 font-mono hidden">
            SYSTEM: ERROR_LOG_DUMP_0x0021
        </div>
    </div>

    <script>
        let currentInput = "0";
        let previousInput = "";
        let operation = null;
        let trickMode = true;

        const display = document.getElementById('display');
        const prevDisplay = document.getElementById('prev-op');
        const msgBox = document.getElementById('msg-box');
        const dogOverlay = document.getElementById('dog-overlay');

        function updateDisplay() {
            display.innerText = currentInput;
            if (currentInput.length > 10) {
                display.classList.add('text-2xl');
                display.classList.remove('text-4xl');
            } else {
                display.classList.add('text-4xl');
                display.classList.remove('text-2xl');
            }
        }

        function appendNum(num) {
            if (currentInput === "0") currentInput = num;
            else currentInput += num;
            updateDisplay();
        }

        function appendOp(op) {
            previousInput = currentInput;
            operation = op;
            prevDisplay.innerText = previousInput + " " + op;
            currentInput = "0";
            updateDisplay();
        }

        function triggerDog() {
            // Random chance to show dog when clearing
            if (Math.random() > 0.5) {
                showDog();
            } else {
                clearDisplay();
            }
        }

        function showDog() {
            dogOverlay.style.display = 'flex';
        }

        function hideDog() {
            dogOverlay.style.display = 'none';
            clearDisplay();
        }

        function clearDisplay() {
            currentInput = "0";
            previousInput = "";
            operation = null;
            prevDisplay.innerText = "";
            display.classList.remove('shake', 'text-red-500');
            msgBox.classList.add('hidden');
            updateDisplay();
        }

        function calculate() {
            let result;
            const prev = parseFloat(previousInput);
            const curr = parseFloat(currentInput);

            if (isNaN(prev) || isNaN(curr)) return;

            switch(operation) {
                case '+': result = prev + curr; break;
                case '-': result = prev - curr; break;
                case '*': result = prev * curr; break;
                case '/': result = prev / curr; break;
                default: return;
            }

            if (trickMode) {
                result += 1;
            }

            if (result === 10) {
                currentInput = "أنا لا أحب رقم 10";
            } else if (result > 1000) {
                currentInput = "هذا رقم كبير جداً لعمري!";
                display.classList.add('shake', 'text-red-500');
                // Surprise dog for big numbers
                setTimeout(showDog, 500);
            } else {
                currentInput = result.toString();
            }

            if (Math.random() > 0.85) {
                msgBox.classList.remove('hidden');
                msgBox.innerText = "خطأ في المعالج: هل أنت متأكد من ذكائك؟";
                showDog();
            }

            prevDisplay.innerText = "";
            operation = null;
            updateDisplay();
        }
    </script>
</body>
</html>
