<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>كرم رايك موبايل | Karam Strike Mobile</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Cairo', sans-serif; background: #000; touch-action: none; }
        canvas { display: block; }
        .ui-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        .interactive { pointer-events: auto; }
        
        /* Mobile Controls */
        #joystick-container {
            position: absolute; bottom: 40px; left: 40px; width: 120px; height: 120px;
            background: rgba(255,255,255,0.1); border-radius: 50%; border: 2px solid rgba(255,255,255,0.2);
        }
        #joystick-knob {
            position: absolute; top: 50%; left: 50%; width: 50px; height: 50px;
            background: rgba(255,255,255,0.4); border-radius: 50%; transform: translate(-50%, -50%);
        }
        .action-btn {
            position: absolute; width: 70px; height: 70px; background: rgba(0,0,0,0.5);
            border: 2px solid #fbbf24; border-radius: 50%; display: flex; align-items: center;
            justify-content: center; font-weight: bold; font-size: 1.2rem; color: #fbbf24;
        }

        /* HUD Styling */
        .health-container {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 300px; height: 12px; background: #222; border-radius: 6px; border: 2px solid #444;
        }
        #health-bar { width: 100%; height: 100%; background: linear-gradient(90deg, #22c55e, #16a34a); border-radius: 4px; transition: width 0.5s; }
        
        .parachute-btn {
            position: absolute; top: 50%; right: 40px; background: #fbbf24; color: #000;
            padding: 15px 30px; border-radius: 8px; font-weight: 900; animation: pulse 1s infinite;
        }

        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

    <!-- Loading Screen -->
    <div id="loadingScreen" class="fixed inset-0 bg-zinc-950 flex flex-col items-center justify-center z-[200]">
        <div class="text-6xl font-black text-yellow-500 mb-8 italic">KARAM MOBILE</div>
        <div class="w-64 h-2 bg-zinc-800 rounded-full overflow-hidden">
            <div id="loadProgress" class="h-full bg-yellow-500 w-0 transition-all duration-300"></div>
        </div>
        <p class="mt-4 text-zinc-500 text-sm">جاري تحميل الخرائط والعتاد...</p>
    </div>

    <!-- Main Menu -->
    <div id="mainMenu" class="ui-overlay flex items-center justify-center bg-black/70 interactive hidden">
        <div class="w-full max-w-4xl p-6 flex flex-col items-center">
            <h1 class="text-7xl font-black text-white mb-12 shadow-lg tracking-tighter">كرم رايك <span class="text-yellow-500">موبايل</span></h1>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 w-full max-w-2xl">
                <button onclick="startGame()" class="bg-yellow-500 hover:bg-yellow-400 text-black font-black text-2xl py-6 rounded-2xl shadow-2xl transition-all transform hover:scale-105">ابدأ معركة البقاء</button>
                <div class="grid grid-cols-2 gap-4">
                    <button class="bg-zinc-800 p-4 rounded-xl text-white font-bold hover:bg-zinc-700">المخزن</button>
                    <button class="bg-zinc-800 p-4 rounded-xl text-white font-bold hover:bg-zinc-700">المتجر</button>
                    <button class="bg-zinc-800 p-4 rounded-xl text-white font-bold hover:bg-zinc-700">الكلان</button>
                    <button class="bg-zinc-800 p-4 rounded-xl text-white font-bold hover:bg-zinc-700">الإعدادات</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Game HUD -->
    <div id="gameHUD" class="ui-overlay hidden">
        <!-- Top Info -->
        <div class="absolute top-4 left-4 flex gap-4">
            <div class="bg-black/50 p-2 rounded border-l-4 border-yellow-500">
                <p class="text-[10px] text-gray-400">القتلى</p>
                <p id="killCount" class="font-black text-xl">0</p>
            </div>
            <div class="bg-black/50 p-2 rounded border-l-4 border-green-500">
                <p class="text-[10px] text-gray-400">الأحياء</p>
                <p id="aliveCount" class="font-black text-xl">99</p>
            </div>
        </div>

        <!-- MiniMap -->
        <div class="absolute top-4 right-4 w-32 h-32 bg-zinc-900 border-2 border-white/20 rounded-lg overflow-hidden">
            <div id="miniPlayer" class="absolute top-1/2 left-1/2 w-2 h-2 bg-yellow-500 rounded-full"></div>
            <div class="absolute inset-0 border-4 border-red-500/30 scale-75 animate-pulse rounded-full"></div>
        </div>

        <!-- Action Buttons -->
        <div id="jumpBtn" onclick="ejectFromPlane()" class="parachute-btn interactive hidden">القفز من الطائرة</div>
        
        <div id="mobileControls" class="hidden">
            <div id="joystick-container" class="interactive">
                <div id="joystick-knob"></div>
            </div>
            <button class="action-btn interactive bottom-[130px] right-[40px] text-2xl" onclick="playerJump()">🚀</button>
            <button class="action-btn interactive bottom-[40px] right-[130px] text-2xl" id="fireBtn">🔥</button>
            <button class="action-btn interactive bottom-[40px] right-[40px] text-2xl" onclick="reload()">🔄</button>
        </div>

        <!-- Health Bar -->
        <div class="health-container">
            <div id="health-bar"></div>
            <p class="absolute -top-6 left-0 text-[10px] font-bold text-white uppercase tracking-widest">الصحة</p>
        </div>

        <!-- Kill Feed -->
        <div id="killFeed" class="absolute top-20 left-1/2 -translate-x-1/2 space-y-1"></div>
    </div>

    <script>
        let scene, camera, renderer, player, plane, terrain;
        let isGaming = false, gameState = 'loading'; // loading, plane, falling, grounded
        let playerMesh, parachuteMesh;
        let joystick = { active: false, x: 0, y: 0 };
        let moveDirection = new THREE.Vector3();
        let yVelocity = 0;

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87ceeb);
            scene.fog = new THREE.FogExp2(0x87ceeb, 0.001);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 10000);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);

            const hemiLight = new THREE.HemisphereLight(0xffffff, 0x444444, 1);
            scene.add(hemiLight);

            const sun = new THREE.DirectionalLight(0xffffff, 1.2);
            sun.position.set(200, 500, 200);
            sun.castShadow = true;
            scene.add(sun);

            createWorld();
            createPlayer();
            setupJoystick();
            
            // Start loading simulation
            let progress = 0;
            const interval = setInterval(() => {
                progress += 5;
                document.getElementById('loadProgress').style.width = progress + '%';
                if(progress >= 100) {
                    clearInterval(interval);
                    document.getElementById('loadingScreen').classList.add('hidden');
                    document.getElementById('mainMenu').classList.remove('hidden');
                }
            }, 50);
        }

        function createWorld() {
            // خريطة عشبية ضخمة
            const groundGeo = new THREE.PlaneGeometry(10000, 10000);
            const groundMat = new THREE.MeshStandardMaterial({ color: 0x4d7c0f });
            terrain = new THREE.Mesh(groundGeo, groundMat);
            terrain.rotation.x = -Math.PI/2;
            terrain.receiveShadow = true;
            scene.add(terrain);

            // إضافة "لوت" عشوائي (صناديق)
            for(let i=0; i<200; i++) {
                const box = new THREE.Mesh(
                    new THREE.BoxGeometry(1.5, 1, 1.5),
                    new THREE.MeshStandardMaterial({ color: 0x78350f })
                );
                box.position.set(Math.random()*4000-2000, 0.5, Math.random()*4000-2000);
                scene.add(box);
            }
        }

        function createPlayer() {
            playerMesh = new THREE.Group();
            
            // جسم الشخصية
            const body = new THREE.Mesh(new THREE.BoxGeometry(1, 2, 0.6), new THREE.MeshStandardMaterial({color: 0x333}));
            body.position.y = 1;
            playerMesh.add(body);

            // رأس الشخصية
            const head = new THREE.Mesh(new THREE.SphereGeometry(0.35), new THREE.MeshStandardMaterial({color: 0xffdbac}));
            head.position.y = 2.3;
            playerMesh.add(head);

            // المظلة (مخفية في البداية)
            const chuteGeo = new THREE.SphereGeometry(3, 16, 8, 0, Math.PI * 2, 0, Math.PI / 2);
            const chuteMat = new THREE.MeshStandardMaterial({ color: 0xffffff, side: THREE.DoubleSide });
            parachuteMesh = new THREE.Mesh(chuteGeo, chuteMat);
            parachuteMesh.position.y = 5;
            parachuteMesh.scale.y = 0.5;
            parachuteMesh.visible = false;
            playerMesh.add(parachuteMesh);

            scene.add(playerMesh);
            playerMesh.visible = false;
        }

        function startGame() {
            document.getElementById('mainMenu').classList.add('hidden');
            document.getElementById('gameHUD').classList.remove('hidden');
            
            // مرحلة الطائرة
            gameState = 'plane';
            const planeGeo = new THREE.BoxGeometry(40, 10, 80);
            plane = new THREE.Mesh(planeGeo, new THREE.MeshStandardMaterial({color: 0x888888}));
            plane.position.set(0, 500, -2000);
            scene.add(plane);

            document.getElementById('jumpBtn').classList.remove('hidden');
        }

        function ejectFromPlane() {
            document.getElementById('jumpBtn').classList.add('hidden');
            gameState = 'falling';
            playerMesh.visible = true;
            playerMesh.position.copy(plane.position);
            scene.remove(plane);
            addKillFeed("لقد قفزت من الطائرة!");
        }

        function setupJoystick() {
            const container = document.getElementById('joystick-container');
            const knob = document.getElementById('joystick-knob');
            
            const handleTouch = (e) => {
                const touch = e.touches[0];
                const rect = container.getBoundingClientRect();
                const centerX = rect.left + rect.width/2;
                const centerY = rect.top + rect.height/2;
                
                let dx = touch.clientX - centerX;
                let dy = touch.clientY - centerY;
                const dist = Math.min(Math.sqrt(dx*dx + dy*dy), 50);
                const angle = Math.atan2(dy, dx);
                
                joystick.x = (Math.cos(angle) * dist) / 50;
                joystick.y = (Math.sin(angle) * dist) / 50;
                
                knob.style.left = `calc(50% + ${Math.cos(angle) * dist}px)`;
                knob.style.top = `calc(50% + ${Math.sin(angle) * dist}px)`;
            };

            container.addEventListener('touchstart', () => joystick.active = true);
            container.addEventListener('touchmove', (e) => {
                e.preventDefault();
                handleTouch(e);
            });
            container.addEventListener('touchend', () => {
                joystick.active = false;
                joystick.x = 0;
                joystick.y = 0;
                knob.style.left = '50%';
                knob.style.top = '50%';
            });
        }

        function animate() {
            requestAnimationFrame(animate);
            
            if(gameState === 'plane' && plane) {
                plane.position.z += 5;
                camera.position.set(plane.position.x, plane.position.y + 20, plane.position.z - 60);
                camera.lookAt(plane.position);
            }

            if(gameState === 'falling') {
                playerMesh.position.y -= (parachuteMesh.visible ? 0.5 : 2);
                playerMesh.position.z += 1;
                
                // فتح المظلة تلقائياً عند الاقتراب من الأرض
                if(playerMesh.position.y < 200) parachuteMesh.visible = true;
                
                if(playerMesh.position.y <= 0) {
                    playerMesh.position.y = 0;
                    parachuteMesh.visible = false;
                    gameState = 'grounded';
                    document.getElementById('mobileControls').classList.remove('hidden');
                    addKillFeed("وصلت للأرض! ابحث عن السلاح.");
                }
                updateTPPCamera();
            }

            if(gameState === 'grounded') {
                if(joystick.active) {
                    const moveX = joystick.x * 0.8;
                    const moveZ = joystick.y * 0.8;
                    
                    const forward = new THREE.Vector3(0, 0, 1).applyQuaternion(playerMesh.quaternion);
                    const right = new THREE.Vector3(1, 0, 0).applyQuaternion(playerMesh.quaternion);
                    
                    playerMesh.position.add(forward.multiplyScalar(-moveZ));
                    playerMesh.position.add(right.multiplyScalar(moveX));
                }
                updateTPPCamera();
            }

            renderer.render(scene, camera);
        }

        function updateTPPCamera() {
            const offset = new THREE.Vector3(0, 5, 12).applyQuaternion(playerMesh.quaternion);
            camera.position.copy(playerMesh.position).add(offset);
            camera.lookAt(playerMesh.position.clone().add(new THREE.Vector3(0, 2, 0)));
        }

        function addKillFeed(text) {
            const feed = document.getElementById('killFeed');
            const div = document.createElement('div');
            div.className = "bg-black/60 px-4 py-1 text-white text-[10px] rounded animate-bounce";
            div.innerText = "📣 " + text;
            feed.prepend(div);
            setTimeout(() => div.remove(), 5000);
        }

        init();
        animate();

        // تدوير الكاميرا باللمس (Right side of screen)
        let touchStartX = 0;
        window.addEventListener('touchstart', (e) => {
            if(e.touches[0].clientX > window.innerWidth/2) touchStartX = e.touches[0].clientX;
        });
        window.addEventListener('touchmove', (e) => {
            if(e.touches[0].clientX > window.innerWidth/2 && gameState === 'grounded') {
                const dx = e.touches[0].clientX - touchStartX;
                playerMesh.rotation.y -= dx * 0.005;
                touchStartX = e.touches[0].clientX;
            }
        });

    </script>
</body>
</html>
