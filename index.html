<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>Pink Panther GTA Style</title>
    <style>
        body { margin: 0; overflow: hidden; background: #222; font-family: sans-serif; }
        canvas { display: block; background: #555; } /* لون الشارع */
        .ui {
            position: absolute; top: 10px; left: 10px;
            color: white; background: rgba(0,0,0,0.5);
            padding: 10px; border-radius: 5px; pointer-events: none;
        }
    </style>
</head>
<body>

<div class="ui">
    <h2>Pink Panther: Urban Roam</h2>
    <p>التحكم: الأسهم (Movement) | السرعة: Shift</p>
    <div id="stats">الموقع: X:0, Y:0</div>
</div>

<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const stats = document.getElementById('stats');

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// إعدادات اللاعب (النمر الوردي)
const player = {
    x: canvas.width / 2,
    y: canvas.height / 2,
    width: 40,
    height: 60,
    color: "#FF91AF", // لون وردي
    speed: 5,
    dx: 0,
    dy: 0
};

// إعدادات البيئة (مباني بسيطة لمحاكاة الشارع)
const buildings = [
    {x: 100, y: 100, w: 150, h: 200},
    {x: 500, y: 300, w: 200, h: 150},
    {x: 800, y: 50, w: 120, h: 300}
];

const keys = {};

window.addEventListener('keydown', (e) => keys[e.code] = true);
window.addEventListener('keyup', (e) => keys[e.code] = false);

function drawPlayer() {
    // رسم جسم النمر
    ctx.fillStyle = player.color;
    ctx.fillRect(player.x, player.y, player.width, player.height);
    
    // رسم العينين (لإعطاء اتجاه)
    ctx.fillStyle = "white";
    ctx.fillRect(player.x + 5, player.y + 10, 10, 10);
    ctx.fillRect(player.x + 25, player.y + 10, 10, 10);
}

function drawBuildings() {
    ctx.fillStyle = "#333";
    buildings.forEach(b => {
        ctx.fillRect(b.x, b.y, b.w, b.h);
        // إضافة نوافذ
        ctx.strokeStyle = "yellow";
        ctx.strokeRect(b.x + 10, b.y + 10, 20, 20);
    });
}

function update() {
    // الحركة
    let currentSpeed = keys['ShiftLeft'] ? player.speed * 2 : player.speed;
    
    if (keys['ArrowUp']) player.y -= currentSpeed;
    if (keys['ArrowDown']) player.y += currentSpeed;
    if (keys['ArrowLeft']) player.x -= currentSpeed;
    if (keys['ArrowRight']) player.x += currentSpeed;

    // حدود الشاشة
    if (player.x < 0) player.x = 0;
    if (player.y < 0) player.y = 0;
    if (player.x + player.width > canvas.width) player.x = canvas.width - player.width;
    if (player.y + player.height > canvas.height) player.y = canvas.height - player.height;

    stats.innerText = `الموقع: X:${Math.floor(player.x)}, Y:${Math.floor(player.y)}`;
}

function loop() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    // رسم خطوط الشارع
    ctx.strokeStyle = "white";
    ctx.setLineDash([20, 20]);
    ctx.beginPath();
    ctx.moveTo(0, canvas.height/2);
    ctx.lineTo(canvas.width, canvas.height/2);
    ctx.stroke();
    ctx.setLineDash([]);

    drawBuildings();
    drawPlayer();
    update();
    
    requestAnimationFrame(loop);
}

loop();

window.addEventListener('resize', () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
});
</script>

</body>
</html>
