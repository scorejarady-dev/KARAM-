<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pink Panther: Street Legend</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #1a1a1a;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        canvas {
            display: block;
            image-rendering: pixelated;
        }
        #ui-layer {
            position: absolute;
            top: 20px;
            right: 20px;
            pointer-events: none;
            color: white;
        }
        .stat-card {
            background: rgba(0, 0, 0, 0.7);
            border-left: 4px solid #ff4da6;
            padding: 10px 20px;
            margin-bottom: 10px;
            border-radius: 4px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        #mini-map {
            position: absolute;
            bottom: 20px;
            left: 20px;
            width: 150px;
            height: 150px;
            background: rgba(0,0,0,0.8);
            border: 2px solid #555;
            border-radius: 50%;
            overflow: hidden;
        }
        #controls-hint {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.6);
            color: #ccc;
            padding: 10px;
            font-size: 12px;
            border-radius: 5px;
        }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div class="stat-card">
            <div class="text-xs text-gray-400">اللاعب</div>
            <div class="text-xl font-bold text-pink-400">النمر الوردي</div>
        </div>
        <div class="stat-card">
            <div class="text-xs text-gray-400">المستوى</div>
            <div class="text-lg">مطلوب ⭐⭐⭐</div>
        </div>
    </div>

    <div id="mini-map">
        <div id="map-player" style="position:absolute; width:6px; height:6px; background:#ff4da6; border-radius:50%; top:50%; left:50%; transform: translate(-50%,-50%);"></div>
    </div>

    <div id="controls-hint">
        التحكم: الأسهم أو WASD للحركة | Shift للجري
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // إعدادات اللعبة
        const worldSize = 3000;
        const player = {
            x: worldSize / 2,
            y: worldSize / 2,
            width: 40,
            height: 40,
            color: '#ff91af', // لون النمر الوردي الأساسي
            speed: 4,
            runSpeed: 8,
            angle: 0,
            isMoving: false
        };

        const keys = {};
        const buildings = [];
        
        // توليد مدينة عشوائية تشبه GTA
        function generateCity() {
            const gridSize = 400;
            for (let i = 0; i < worldSize; i += gridSize) {
                for (let j = 0; j < worldSize; j += gridSize) {
                    // ترك مساحة للشوارع
                    if (Math.random() > 0.3) {
                        buildings.push({
                            x: i + 50,
                            y: j + 50,
                            w: gridSize - 100,
                            h: gridSize - 100,
                            color: `hsl(${200 + Math.random() * 50}, 10%, ${20 + Math.random() * 20}%)`
                        });
                    }
                }
            }
        }

        function init() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            generateCity();
            requestAnimationFrame(gameLoop);
        }

        window.addEventListener('keydown', e => keys[e.code] = true);
        window.addEventListener('keyup', e => keys[e.code] = false);

        function update() {
            let currentSpeed = keys['ShiftLeft'] || keys['ShiftRight'] ? player.runSpeed : player.speed;
            let moveX = 0;
            let moveY = 0;

            if (keys['ArrowUp'] || keys['KeyW']) moveY -= 1;
            if (keys['ArrowDown'] || keys['KeyS']) moveY += 1;
            if (keys['ArrowLeft'] || keys['KeyA']) moveX -= 1;
            if (keys['ArrowRight'] || keys['KeyD']) moveX += 1;

            if (moveX !== 0 || moveY !== 0) {
                // حساب الزاوية للحركة
                player.angle = Math.atan2(moveY, moveX);
                
                let nextX = player.x + Math.cos(player.angle) * currentSpeed;
                let nextY = player.y + Math.sin(player.angle) * currentSpeed;

                // نظام الاصطدام المبسط
                let collision = false;
                for (let b of buildings) {
                    if (nextX < b.x + b.w && nextX + player.width > b.x &&
                        nextY < b.y + b.h && nextY + player.height > b.y) {
                        collision = true;
                        break;
                    }
                }

                if (!collision) {
                    player.x = nextX;
                    player.y = nextY;
                }
                player.isMoving = true;
            } else {
                player.isMoving = false;
            }

            // منع الخروج من العالم
            player.x = Math.max(0, Math.min(worldSize, player.x));
            player.y = Math.max(0, Math.min(worldSize, player.y));
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // الكاميرا تتبع اللاعب
            const camX = canvas.width / 2 - player.x;
            const camY = canvas.height / 2 - player.y;

            ctx.save();
            ctx.translate(camX, camY);

            // رسم الأرضية (الأسفلت)
            ctx.fillStyle = '#333';
            ctx.fillRect(0, 0, worldSize, worldSize);

            // رسم خطوط الشوارع
            ctx.strokeStyle = '#555';
            ctx.lineWidth = 2;
            for(let i=0; i<worldSize; i+=100) {
                ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, worldSize); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(worldSize, i); ctx.stroke();
            }

            // رسم المباني
            buildings.forEach(b => {
                // ظل المبنى
                ctx.fillStyle = 'rgba(0,0,0,0.3)';
                ctx.fillRect(b.x + 10, b.y + 10, b.w, b.h);
                
                // جسم المبنى
                ctx.fillStyle = b.color;
                ctx.fillRect(b.x, b.y, b.w, b.h);
                
                // تفاصيل السطح
                ctx.strokeStyle = 'rgba(255,255,255,0.1)';
                ctx.strokeRect(b.x + 5, b.y + 5, b.w - 10, b.h - 10);
            });

            // رسم اللاعب (النمر الوردي)
            ctx.save();
            ctx.translate(player.x + player.width/2, player.y + player.height/2);
            ctx.rotate(player.angle);
            
            // جسم النمر
            ctx.fillStyle = player.color;
            // شكل بيضاوي للجسم
            ctx.beginPath();
            ctx.ellipse(0, 0, 25, 15, 0, 0, Math.PI * 2);
            ctx.fill();
            
            // الرأس
            ctx.beginPath();
            ctx.arc(15, 0, 12, 0, Math.PI * 2);
            ctx.fill();

            // الأذنين
            ctx.beginPath(); ctx.arc(12, -10, 5, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.arc(12, 10, 5, 0, Math.PI * 2); ctx.fill();

            // العينين الصفراء المميزة للنمر الوردي
            ctx.fillStyle = 'yellow';
            ctx.beginPath(); ctx.arc(18, -4, 3, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.arc(18, 4, 3, 0, Math.PI * 2); ctx.fill();
            
            ctx.restore();

            ctx.restore();
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        init();
    </script>
</body>
</html>
